[functions]
  included_files = ["_public/search-index.json", "_src/_data/packages.json"]

[functions."orb-chat"]
  timeout = 60

[functions."orb-realtime-session"]
  timeout = 30

[functions."orb-realtime-tool"]
  timeout = 30

[[edge_functions]]
  function = "url-heal"
  path = "/*"

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/api/mcp"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/api/mcp/search-content"
  to = "/.netlify/functions/mcp-search-content"
  status = 200

[[redirects]]
  from = "/api/mcp/get-content-by-url"
  to = "/.netlify/functions/mcp-get-content-by-url"
  status = 200

[[redirects]]
