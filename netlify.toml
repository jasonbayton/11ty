  status = 200

[[redirects]]
  from = "/api/mcp/sysapps/get-device-apps"
  to = "/.netlify/functions/mcp-sysapps-get-device-apps"
  status = 200

[[redirects]]
  from = "/api/mcp/sysapps/search"
